<html>

<head>
<meta charset="UTF-8">
<title>Week 2</title>
<style>
  body {
    margin: 0;
    background: #ffd373;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
    max-width: 1200px;
    max-height: 1300px;
    margin: 40px auto;
    padding: 0 20px;
  }

  .gallery-item {
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s;
  }
  
  .gallery-item img {
    width: 100%;
    height: auto;
    display: block;
  }

  #lightbox {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    z-index: 999;
    justify-content: center;
    align-items: center;
  }
  .lightbox-container {
    display: flex;
    flex-direction: row;
    align-items: center;
    max-width: 60%;
    max-height: 70%;
    background: #000;
    border-radius: 8px;
    padding: 20px;
  }
  .lightbox-container img {
    max-width: 50%;
    max-height: 70%;
    object-fit: contain;
    border: 2px solid white;
    border-radius: 4px;
  }
  .lightbox-caption {
    color: white;
    margin-left: 20px;
    max-width: 35%;
    max-height: 80%;
    overflow-y: auto;
    font-size: 1rem;
    line-height: 1.4;
    padding-right: 10px;
  }

 

</style>
</head>

<body>
    <a href="index.html" style="position: absolute; top: 5px; left: 5px;">Back</a> 
    <h1 style="text-align: center; margin-top: 30px;">Week 2 </h1>

<div class="gallery">

  </div>
  <div class="gallery-item">
    <img src="images2/week2 1.JPG" alt="This picture is the paper prototyping done in class. This one shows the approximate position of the website's home page title that I envisioned, and below the title is the picture.">

<Lightbox HTML >
<div id="lightbox" onclick="this.style.display='none'">
  <div class="lightbox-container" onclick="event">
    <img id="lightbox-img" src="" style="max-width: 50%; max-height: 60% ;">
    <div id="lightbox-caption" class="lightbox-caption"></div>
  </div>
</div>

<script>
  const items = document.querySelectorAll('.gallery-item img');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  const lightboxCaption = document.getElementById('lightbox-caption');

  items.forEach(img => {
    img.onclick = (e) => {
      lightboxImg.src = img.src;
      
      lightboxCaption.textContent = img.alt;
      lightbox.style.display = 'flex';
    };
  });
</script>



   
</body>
</html>
