<style>
  body {
    margin: 0;
    background: #ffd373;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
    max-width: 1200px;
    max-height: 1300px;
    margin: 40px auto;
    padding: 0 20px;
  }

  .gallery-item {
    overflow: hidden;
    cursor: pointer;
  }
  
  .gallery-item img {
    width: 100%;
    height: auto;
    display: block;
  }

  #lightbox {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    z-index: 999;
    justify-content: center;
    align-items: center;
  }
  .lightbox-container {
    display: flex;
    flex-direction: row;
    align-items: center;
    max-width: 80%;
    max-height: 90%;
    background: #000;
   
  }
  .lightbox-container img {
    max-width: 50%;
    max-height: 70%;
    object-fit: contain;
   
  }
  .lightbox-caption {
    color: white;
    margin-left: 20px;
    max-width: 35%;
    max-height: 50%;
    overflow-y: auto;
    font-size: 16px;
    line-height: 1.4;
    padding-right: 8px;
  }

 

</style>

  <div class="gallery-item">
    <img src="images4/css1.png" alt="This is the CSS I have added to the weekly page HTML. Firstly, the margin removes the border and changes the background colour. Secondly, in addition to the elements in the template, I’ve added constraints to keep the images within the designated area and prevent them from extending beyond the screen. The margin and padding ensure the grid is positioned towards the centre on all four sides. With a top and bottom margin of 40px and automatic horizontal centring, the gallery is centred horizontally on the page. At the same time, set the inner margins on both sides to 20px, so that the gallery content does not tightly adhere to the screen edges, especially when the screen is narrow, leaving some breathing space. In the gallery-item, the overflow property hides the content that exceeds the border. In the img section, setting width: 100% fills the item completely, ensuring that the width of each image is the same. At the same time, to maintain the aspect ratio, the height is set to be automatically adjusted. Using display: block ensures that the image fits exactly within this box. The display property of the lightbox section being set to none is to hide it temporarily and then show it again after inserting JavaScript. The position is set to fixed, meaning it remains in the same position and will not be moved. The background is semi-transparent. The z-index value of 999 is used to ensure that the pop-up window appears at the top of the layers.">
  </div>
  <div class="gallery-item">
    <img src="images4/css2.png" alt=" The light-container is related to this pop-up section. The flex display and flex-direction: row are used to align my images and text side by side. The align-items ensures that the cards in this section are centered vertically. The colour here is black, which is different from the black with low saturation of the background. For the image section, I kept the original aspect ratio of the images and displayed them within a fixed area. For the caption section, the colour was chosen to be white, which makes it more visible on a black background. The margin refers to the distance between the text and the images. max-height is used to limit the text from exceeding the black frame. Choosing overflow-y: auto means that when the text exceeds the limit, it will scroll vertically. After conducting a search, it was found that 16px can also be written as 1rem. I chose a line spacing that is 1.4 times the size of the text.">
  </div>
  <div class="gallery-item">

<Lightbox HTML >
<div id="lightbox" onclick="this.style.display='none'">
  <div class="lightbox-container" >
    <img id="lightbox-img" src="" style="max-width: 50%; max-height: 60% ;">
    <div id="lightbox-caption" class="lightbox-caption"></div>
  </div>
</div>

<script>
  const items = document.querySelectorAll('.gallery-item img');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  const lightboxCaption = document.getElementById('lightbox-caption');

  items.forEach(img => {
    img.onclick = (e) => {
      lightboxImg.src = img.src;
      lightboxCaption.textContent = img.alt;
      lightbox.style.display = 'flex';
    };
  });
</script>
